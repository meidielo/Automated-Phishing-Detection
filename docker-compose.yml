services:
  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phishing-orchestrator
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # These override .env values if set; leave blank to use .env
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DASHBOARD_PORT=8000
      - MAX_CONCURRENT_ANALYZERS=${MAX_CONCURRENT_ANALYZERS:-10}
      - ANALYSIS_PIPELINE_TIMEOUT_SECONDS=${ANALYSIS_PIPELINE_TIMEOUT_SECONDS:-120}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
