services:
  browser-sandbox:
    image: mcr.microsoft.com/playwright:v1.58.0-noble
    container_name: phishing-browser-sandbox
    command: ["npx", "playwright", "run-server", "--host", "0.0.0.0", "--port", "3000"]
    init: true
    shm_size: "1gb"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net=require('net'); const s=net.connect(3000,'127.0.0.1',()=>{s.destroy();process.exit(0)}); s.on('error',()=>process.exit(1)); setTimeout(()=>{s.destroy();process.exit(1)},2000);\""]
      interval: 20s
      timeout: 5s
      start_period: 15s
      retries: 6
    networks:
      - browser-sandbox

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phishing-orchestrator
    init: true
    depends_on:
      browser-sandbox:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # These override .env values if set; leave blank to use .env
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DASHBOARD_PORT=8000
      - MAX_CONCURRENT_ANALYZERS=${MAX_CONCURRENT_ANALYZERS:-10}
      - ANALYSIS_PIPELINE_TIMEOUT_SECONDS=${ANALYSIS_PIPELINE_TIMEOUT_SECONDS:-120}
      - PLAYWRIGHT_WS_ENDPOINT=ws://browser-sandbox:3000/
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - default
      - browser-sandbox
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      # Matches the Dockerfile healthcheck (cycle 5 #18 supposedly removed
      # curl but only touched the Dockerfile; this file kept the curl
      # reference until the cycle 12 audit caught it). Uses stdlib urllib
      # so there is no curl dependency anywhere in the image.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=2).status == 200 else 1)"]
      interval: 20s
      timeout: 5s
      start_period: 45s
      retries: 6

networks:
  browser-sandbox:
    driver: bridge
