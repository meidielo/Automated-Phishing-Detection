services:
  browser-sandbox:
    image: mcr.microsoft.com/playwright:v1.58.0-noble
    container_name: phishing-browser-sandbox
    command: ["npx", "playwright", "run-server", "--host", "0.0.0.0", "--port", "3000"]
    init: true
    shm_size: "1gb"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net=require('net'); const s=net.connect(3000,'127.0.0.1',()=>{s.destroy();process.exit(0)}); s.on('error',()=>process.exit(1)); setTimeout(()=>{s.destroy();process.exit(1)},2000);\""]
      interval: 20s
      timeout: 5s
      start_period: 15s
      retries: 6
    networks:
      - browser-sandbox

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phishing-orchestrator
    init: true
    # Cloudflare Tunnel connects to the Docker network. The host mapping is
    # loopback-only so local cron/SSH checks can probe health without exposing
    # the dashboard on the public or Tailscale interfaces.
    ports:
      - "127.0.0.1:8000:8000"
    expose:
      - "8000"
    depends_on:
      browser-sandbox:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - LOG_LEVEL=WARNING
      - DASHBOARD_PORT=8000
      - MAX_CONCURRENT_ANALYZERS=5
      - ANALYSIS_PIPELINE_TIMEOUT_SECONDS=90
      - URL_DETONATION_TIMEOUT_SECONDS=12
      - PLAYWRIGHT_WS_ENDPOINT=ws://browser-sandbox:3000/
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./eval_runs:/app/eval_runs
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=2).status == 200 else 1)"]
      interval: 20s
      timeout: 5s
      start_period: 45s
      retries: 6
    networks:
      - tunnel
      - browser-sandbox

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - tunnel

networks:
  tunnel:
    driver: bridge
  browser-sandbox:
    driver: bridge
