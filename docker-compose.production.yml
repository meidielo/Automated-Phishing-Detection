services:
  browser-sandbox:
    image: mcr.microsoft.com/playwright:v1.58.0-noble
    container_name: phishing-browser-sandbox
    command: ["npx", "playwright", "run-server", "--host", "0.0.0.0", "--port", "3000"]
    init: true
    shm_size: "1gb"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    restart: unless-stopped
    networks:
      - browser-sandbox

  orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: phishing-orchestrator
    # No port mapping to host -- Cloudflare Tunnel connects directly
    # to the Docker network. Nothing is exposed on the host's public IP.
    expose:
      - "8000"
    depends_on:
      - browser-sandbox
    env_file:
      - .env
    environment:
      - LOG_LEVEL=WARNING
      - DASHBOARD_PORT=8000
      - MAX_CONCURRENT_ANALYZERS=5
      - PLAYWRIGHT_WS_ENDPOINT=ws://browser-sandbox:3000/
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./eval_runs:/app/eval_runs
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health', timeout=5).status == 200 else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    networks:
      - tunnel
      - browser-sandbox

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-tunnel
    command: tunnel run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    restart: unless-stopped
    depends_on:
      orchestrator:
        condition: service_healthy
    networks:
      - tunnel

networks:
  tunnel:
    driver: bridge
  browser-sandbox:
    driver: bridge
