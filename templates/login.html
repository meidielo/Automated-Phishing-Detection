<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - PhishAnalyze</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .login-panel {
      width: min(420px, 100%);
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: var(--text-muted); font-size: 14px; line-height: 1.5; margin-bottom: 22px; }
    label {
      display: block;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    input[type="password"] {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg-input);
      color: var(--text-primary);
      padding: 12px 14px;
      font-size: 15px;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 6px;
      background: var(--accent);
      color: white;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 14px;
    }
    button:hover { background: var(--accent-hover); }
    .error {
      min-height: 18px;
      color: var(--error-text);
      font-size: 13px;
      margin-bottom: 12px;
    }
    .demo-entry {
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }
    .demo-entry a {
      display: inline-flex;
      color: var(--accent-light);
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 8px;
    }
    .demo-entry a:hover { color: var(--accent); }
    .demo-entry span {
      display: block;
      color: var(--text-muted);
      font-size: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="login-panel">
    <h1>Analyst login</h1>
    <p>Internal PhishAnalyze tools require the owner analyst token.</p>
    <form method="post" action="/admin/login">
      <input type="hidden" name="next" value="{{NEXT_PATH}}">
      <label for="token">Analyst token</label>
      <input id="token" name="token" type="password" autocomplete="current-password" autofocus required>
      <div class="error">{{ERROR_MESSAGE}}</div>
      <button type="submit">Login</button>
    </form>
    <div class="demo-entry">
      <a href="/analyze">Open PhishAnalyze</a>
      <span>Use email/password login for the public product. Owner system tools stay under /admin.</span>
    </div>
    {{DEMO_LINK}}
  </main>
</body>
</html>
