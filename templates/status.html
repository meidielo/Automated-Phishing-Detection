<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Status — PhishAnalyze</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: var(--nav-bg);
      border-bottom: 1px solid var(--nav-border);
      padding: 0 32px; height: 56px;
      display: flex; align-items: center; gap: 24px;
    }
    nav .logo {
      font-size: 17px; font-weight: 700; color: var(--accent);
      text-decoration: none; margin-right: auto;
      display: flex; align-items: center; gap: 8px;
    }
    nav a {
      color: var(--nav-link); text-decoration: none; font-size: 14px;
      padding: 6px 12px; border-radius: 6px; transition: background .2s, color .2s;
    }
    nav a:hover, nav a.active { background: var(--nav-hover-bg); color: var(--text-primary); }

    /* ── Layout ── */
    .page { max-width: 1000px; margin: 0 auto; padding: 36px 24px; }

    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 26px; font-weight: 700; }
    .page-header p  { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

    .top-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .ts      { font-size: 12px; color: var(--text-muted); }

    /* ── Cards ── */
    .card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 22px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 14px; font-weight: 600; color: var(--text-secondary);
      text-transform: uppercase; letter-spacing: .5px;
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title::before {
      content: ''; display: inline-block;
      width: 3px; height: 14px;
      background: var(--accent); border-radius: 2px;
    }

    /* ── Summary pills ── */
    .summary-row { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 4px; }
    .sum-item { text-align: center; }
    .sum-item .big { font-size: 28px; font-weight: 700; }
    .sum-item .lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; margin-top: 2px; }
    .col-green  { color: var(--v-clean); }
    .col-yellow { color: var(--v-suspicious); }
    .col-red    { color: var(--v-phishing); }
    .col-purple { color: var(--accent); }

    /* ── Key grid ── */
    .key-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 10px;
    }
    .key-item {
      display: flex; align-items: center; gap: 12px;
      background: var(--bg-tertiary); border: 1px solid var(--border);
      border-radius: 8px; padding: 12px 14px;
      border-left: 3px solid transparent;
    }
    .key-item.ok   { border-left-color: var(--v-clean-border); }
    .key-item.miss { border-left-color: var(--border); }
    .key-name  { font-size: 13px; font-weight: 500; flex: 1; }
    .key-badge {
      font-size: 11px; font-weight: 600;
      padding: 2px 9px; border-radius: 10px;
    }
    .key-badge.ok   { background: var(--v-clean-bg); color: var(--v-clean); border: 1px solid var(--v-clean-border); }
    .key-badge.miss { background: var(--bg-hover); color: var(--text-muted); border: 1px solid var(--border); }

    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .dot.green  { background: var(--v-clean); }
    .dot.grey   { background: var(--text-muted); }
    .dot.red    { background: var(--v-phishing); }

    /* ── Config table ── */
    .cfg-table { width: 100%; border-collapse: collapse; }
    .cfg-table tr { border-bottom: 1px solid var(--border); }
    .cfg-table tr:last-child { border-bottom: none; }
    .cfg-table td { padding: 10px 8px; font-size: 13px; }
    .cfg-table td:first-child { color: var(--text-muted); width: 55%; }
    .cfg-table td:last-child  { font-weight: 500; color: var(--text-primary); }

    .pill {
      display: inline-block; padding: 3px 10px;
      border-radius: 10px; font-size: 12px; font-weight: 600;
    }
    .pill.green  { background: var(--v-clean-bg); color: var(--v-clean); border: 1px solid var(--v-clean-border); }
    .pill.yellow { background: var(--v-suspicious-bg); color: var(--v-suspicious); border: 1px solid var(--v-suspicious-border); }
    .pill.red    { background: var(--v-phishing-bg); color: var(--v-phishing); border: 1px solid var(--v-phishing-border); }
    .pill.grey   { background: var(--bg-hover); color: var(--text-muted); border: 1px solid var(--border); }

    /* ── Button ── */
    .btn {
      padding: 7px 16px; background: var(--accent); color: #fff;
      border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .btn:hover    { background: var(--accent-hover); }
    .btn:disabled { opacity: .5; cursor: default; }

    .err-box {
      display: none; background: var(--error-bg); border: 1px solid var(--error-border);
      border-radius: 8px; padding: 14px 18px; color: var(--error-text);
      font-size: 13px; margin-bottom: 20px;
    }

    @media(max-width:600px) {
      .key-grid { grid-template-columns: 1fr; }
      .page { padding: 20px 16px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/analyze">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    PhishAnalyze
  </a>
  <a href="/analyze">Analyze</a>
  <a href="/dashboard">Dashboard</a>
  <a href="/monitor">Monitor</a>
  <a href="/status" class="active">API Status</a>
</nav>

<div class="page">

  <div class="page-header">
    <h1>System &amp; API Status</h1>
    <p>Configured API keys, pipeline settings, and IMAP monitor state</p>
  </div>

  <div class="top-row">
    <button class="btn" id="btnRefresh" onclick="load()">↻ Refresh</button>
    <span class="ts" id="tsLabel">Loading…</span>
  </div>

  <div class="err-box" id="errBox"></div>

  <!-- Overall health -->
  <div class="card">
    <div class="card-title">Overall Health</div>
    <div class="summary-row">
      <div class="sum-item">
        <div class="big col-purple" id="sumTotal">–</div>
        <div class="lbl">API keys</div>
      </div>
      <div class="sum-item">
        <div class="big col-green" id="sumOk">–</div>
        <div class="lbl">Configured</div>
      </div>
      <div class="sum-item">
        <div class="big col-yellow" id="sumMiss">–</div>
        <div class="lbl">Not set</div>
      </div>
      <div class="sum-item">
        <div class="big" id="sumPipeline">–</div>
        <div class="lbl">Pipeline</div>
      </div>
      <div class="sum-item">
        <div class="big" id="sumMonitor">–</div>
        <div class="lbl">IMAP monitor</div>
      </div>
    </div>
  </div>

  <!-- API Keys -->
  <div class="card">
    <div class="card-title">API Keys</div>
    <div class="key-grid" id="keyGrid"><p style="color:var(--text-dim)">Loading…</p></div>
  </div>

  <!-- Pipeline -->
  <div class="card">
    <div class="card-title">Pipeline Configuration</div>
    <table class="cfg-table" id="pipelineTable">
      <tr><td colspan="2" style="color:var(--text-dim)">Loading…</td></tr>
    </table>
  </div>

  <!-- IMAP -->
  <div class="card">
    <div class="card-title">IMAP Monitor</div>
    <table class="cfg-table" id="imapTable">
      <tr><td colspan="2" style="color:var(--text-dim)">Loading…</td></tr>
    </table>
  </div>

</div>

<script>
const KEY_LABELS = {
  virustotal:          'VirusTotal',
  urlscan:             'URLScan.io',
  abuseipdb:           'AbuseIPDB',
  google_safebrowsing: 'Google Safe Browsing',
  hybrid_analysis:     'Hybrid Analysis (Sandbox)',
  anyrun:              'ANY.RUN (Sandbox)',
  joesandbox:          'Joe Sandbox',
  anthropic:           'Anthropic (LLM)',
  deepseek:            'DeepSeek (LLM)',
  moonshot:            'Moonshot/Kimi (LLM)',
  gemini:              'Gemini (LLM)',
  openai:              'OpenAI (LLM)',
};

async function load() {
  const btn = document.getElementById('btnRefresh');
  btn.disabled = true; btn.textContent = '↻ Loading…';
  document.getElementById('errBox').style.display = 'none';

  try {
    const [sysRes, monRes, cfgRes] = await Promise.all([
      fetch('/api/system-status'),
      fetch('/api/monitor/stats'),
      fetch('/api/config'),
    ]);
    if (!sysRes.ok) throw new Error('/api/system-status returned ' + sysRes.status);

    const sys = await sysRes.json();
    const mon = monRes.ok ? await monRes.json() : {};
    const cfg = cfgRes.ok ? await cfgRes.json() : {};

    renderSummary(sys, mon);
    renderKeys(sys.api_keys || {});
    renderPipeline(cfg, sys);
    renderImap(sys.imap || {}, mon);

    document.getElementById('tsLabel').textContent = 'Updated ' + new Date().toLocaleTimeString();
  } catch (e) {
    const el = document.getElementById('errBox');
    el.textContent = 'Could not load status: ' + e.message;
    el.style.display = 'block';
    document.getElementById('tsLabel').textContent = 'Failed';
  } finally {
    btn.disabled = false; btn.textContent = '↻ Refresh';
  }
}

function renderSummary(sys, mon) {
  const vals = Object.values(sys.api_keys || {});
  const ok   = vals.filter(Boolean).length;
  const miss = vals.length - ok;

  document.getElementById('sumTotal').textContent = vals.length;
  document.getElementById('sumOk').textContent    = ok;
  document.getElementById('sumMiss').textContent  = miss;

  document.getElementById('sumPipeline').innerHTML = '<span class="pill green">Ready</span>';

  const imap = mon.imap_configured;
  const run  = mon.running;
  document.getElementById('sumMonitor').innerHTML =
    !imap ? '<span class="pill grey">Off</span>'  :
    run   ? '<span class="pill green">Active</span>' :
            '<span class="pill red">Stopped</span>';
}

function renderKeys(keys) {
  let html = '';
  for (const [k, label] of Object.entries(KEY_LABELS)) {
    const ok = keys[k] === true;
    html += `<div class="key-item ${ok ? 'ok' : 'miss'}">
      <div class="dot ${ok ? 'green' : 'grey'}"></div>
      <div class="key-name">${label}</div>
      <span class="key-badge ${ok ? 'ok' : 'miss'}">${ok ? 'Configured' : 'Not set'}</span>
    </div>`;
  }
  document.getElementById('keyGrid').innerHTML = html;
}

function renderPipeline(cfg, sys) {
  const rows = [
    ['Max concurrent analyzers',   cfg.max_concurrent_analyzers    ?? '–'],
    ['Pipeline timeout (s)',        cfg.pipeline_timeout            ?? '–'],
    ['URL detonation timeout (s)',  cfg.url_detonation_timeout      ?? '–'],
    ['LLM provider',                sys.llm_provider                ?? '–'],
    ['Sandbox provider',            sys.sandbox_provider            ?? '–'],
  ];
  document.getElementById('pipelineTable').innerHTML =
    rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');
}

function renderImap(imap, mon) {
  const configured = imap.configured === true;
  const running    = mon.running === true;
  const s = mon.stats || {};

  const statusHtml = !configured
    ? '<span class="pill grey">Not configured</span>'
    : running
      ? '<span class="pill green">Running</span>'
      : '<span class="pill red">Stopped</span>';

  const rows = [
    ['Status',               statusHtml],
    ['Host',                 imap.host               || '–'],
    ['User',                 imap.user               || '–'],
    ['Inbox folder',         imap.folder             || '–'],
    ['Quarantine folder',    imap.quarantine_folder  || '–'],
    ['Poll interval (s)',    imap.poll_interval       ?? '–'],
    ['Emails processed',     s.emails_processed       ?? '–'],
    ['Phishing detected',    s.phishing_detected      ?? '–'],
    ['Quarantined',          s.quarantined            ?? '–'],
    ['Errors',               s.errors                 ?? '–'],
    ['Started at',           s.started_at  ? new Date(s.started_at).toLocaleString()  : '–'],
    ['Last poll',            s.last_poll   ? new Date(s.last_poll).toLocaleString()   : '–'],
  ];

  document.getElementById('imapTable').innerHTML =
    rows.map(([k, v]) => `<tr><td>${k}</td><td>${v}</td></tr>`).join('');
}

load();
</script>
</body>
</html>
