name: CI

# Runs on every push and PR to main. Three independent jobs:
#   1. test       — full pytest suite on a fresh checkout against the locked
#                   dependency set. This is the "fresh clone catches things
#                   local-pass misses" gate from the cycle 4 review.
#   2. browser-smoke — Playwright dashboard chart check under strict CSP.
#   3. lint       — flake8 hygiene check.
#   4. pip-audit  — supply-chain CVE scan against requirements.lock.
#                   Fails the build on any high or critical advisory.
#
# All jobs install from `requirements.lock` (hash-pinned) so the build is
# reproducible. Re-pin by running locally:
#     uv pip compile requirements.txt -o requirements.lock --generate-hashes
# and committing the result.

on:
  push:
    branches: [main]
  # `pull_request` covers feature branches without burning CI minutes
  # on every personal scratch push. Verified by the cycle 7 sanity
  # check (run id 24403600695): a deliberately-red branch must be
  # opened as a PR to trigger CI. A `push:` trigger on all branches
  # was considered and rejected as needlessly expensive.
  pull_request:
    branches: [main]
  # Daily run so freshly disclosed CVEs against pinned versions surface
  # without waiting for the next code change.
  schedule:
    - cron: "17 4 * * *"

jobs:
  test:
    name: Tests (fresh checkout)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system libs needed by pyzbar / opencv / playwright
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              libzbar0 \
              libgomp1

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          # --require-hashes enforces the hash pins in requirements.lock.
          # If anything in the lock file is tampered with, install fails.
          pip install --require-hashes -r requirements.lock

      - name: Run pytest
        run: |
          python -m pytest -q --tb=short

  browser-smoke:
    name: Dashboard browser smoke
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system libs needed by app imports
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
              libzbar0 \
              libgomp1

      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --require-hashes -r requirements.lock

      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Verify vendored Chart.js asset
        run: python scripts/vendor_chartjs.py --check

      - name: Run dashboard chart smoke check
        env:
          ANALYST_API_TOKEN: ci-dashboard-browser-token
        run: python scripts/dashboard_browser_check.py

  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8 (errors only)
        # Only block on real errors (E9, F63, F7, F82). Style-only warnings
        # are reported but non-blocking so the gate stays useful.
        run: |
          flake8 src tests main.py \
              --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src tests main.py \
              --count --max-line-length=120 --statistics --exit-zero

  pip-audit:
    name: Supply-chain audit
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Official PyPA action. Failure semantics, verified via the action's
      # own action.yml: `internal-be-careful-allow-failure` defaults to
      # `false`, which means any non-zero exit from pip-audit fails the
      # job. pip-audit itself exits 1 on any vulnerability finding, so
      # this configuration IS strict-by-default. If you ever need to
      # tolerate a specific CVE, use `internal-be-careful-extra-flags`
      # with `--ignore-vuln <id>` AND document the expiry date in the
      # PR description so it doesn't become a permanent allowance.
      - name: Run pip-audit on requirements.lock
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements.lock
