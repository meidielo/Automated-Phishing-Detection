# ═══════════════════════════════════════════════════════════════════
# Phishing Detection Pipeline — Configuration
# ═══════════════════════════════════════════════════════════════════
#
# All values here serve as DEFAULTS. Environment variables always
# override YAML values (e.g., VIRUSTOTAL_API_KEY overrides api.virustotal_key).
#
# Secrets (API keys, passwords) should go in .env, NOT here.
# This file is safe to commit; .env is gitignored.

# ── API Client Configuration ──────────────────────────────────────
api:
  # Threat intelligence providers
  virustotal_key: ""          # env: VIRUSTOTAL_API_KEY
  urlscan_key: ""             # env: URLSCAN_API_KEY
  abuseipdb_key: ""           # env: ABUSEIPDB_API_KEY
  google_safebrowsing_key: "" # env: GOOGLE_SAFE_BROWSING_API_KEY

  # Sandbox provider: hybrid_analysis | anyrun | joesandbox
  sandbox_provider: "hybrid_analysis"   # env: SANDBOX_PROVIDER
  hybrid_analysis_key: ""               # env: HYBRID_ANALYSIS_API_KEY
  anyrun_key: ""                        # env: ANYRUN_API_KEY
  joesandbox_key: ""                    # env: JOESANDBOX_API_KEY

  # LLM for NLP intent classification: anthropic | deepseek | moonshot | gemini | openai
  llm_provider: "deepseek"    # env: LLM_PROVIDER
  anthropic_key: ""           # env: ANTHROPIC_API_KEY
  openai_key: ""              # env: OPENAI_API_KEY
  deepseek_key: ""            # env: DEEPSEEK_API_KEY
  moonshot_key: ""            # env: MOONSHOT_API_KEY
  gemini_key: ""              # env: GEMINI_API_KEY

# ── IMAP Polling Configuration ────────────────────────────────────
imap:
  host: "imap.example.com"    # env: IMAP_HOST
  port: 993                   # env: IMAP_PORT
  user: ""                    # env: IMAP_USER
  password: ""                # env: IMAP_PASSWORD
  folder: "INBOX"             # env: IMAP_FOLDER
  poll_interval_seconds: 60

smtp:
  host: "smtp.zoho.com"       # env: SMTP_HOST
  port: 587                   # env: SMTP_PORT
  username: ""                # env: SMTP_USERNAME
  password: ""                # env: SMTP_PASSWORD
  from_email: ""              # env: SMTP_FROM_EMAIL
  from_name: "PhishAnalyze"    # env: SMTP_FROM_NAME
  use_ssl: false              # env: SMTP_USE_SSL
  starttls: true              # env: SMTP_STARTTLS

# ── Scoring & Verdict Configuration ───────────────────────────────
scoring:
  # Analyzer weights. Intended to sum to 1.0 but the decision engine
  # normalizes by actual weighted confidence, so a non-unity total is
  # valid (the validator warns but accepts).
  #
  # sender_profiling is at 0.00 because it is advisory-only: its signal
  # contributes to the CLEAN override check (_is_clean_email) but not to
  # the weighted score. This matches docs/MITRE_ATTACK_MAPPING.md which
  # has always described it as "not in the active scoring weights per
  # config.yaml defaults". The cycle 12 audit caught that the config
  # actually had it at 0.10 — contradicting the doc — and that the
  # analyzer was returning a hardcoded cold-start 0.45/0.5 signal on
  # every sample, actively diluting real signals from other analyzers.
  # Root-cause framing: cycle 4's dead-domain-confidence lesson was
  # applied to url_reputation only, not generalized to every analyzer
  # that could return signal-without-data. Four discipline gaps stacked:
  # cycle 4's lesson applied incompletely, compounded by doc/config
  # drift, compounded by no end-to-end eval until cycle 10, compounded
  # by cycle 10 framing absorbing the result. Cycle 12 closes all four.
  # The pre-payment analyzer weights intentionally sum to 0.90. The
  # payment_fraud layer adds a focused 0.10 business-decision signal while
  # preserving sender_profiling as advisory-only.
  weights:
    header_analysis: 0.10
    url_reputation: 0.15
    domain_intelligence: 0.10
    url_detonation: 0.15
    brand_impersonation: 0.10
    attachment_analysis: 0.15
    nlp_intent: 0.15
    sender_profiling: 0.00
    payment_fraud: 0.10

  # Verdict score ranges: [lower_bound, upper_bound)
  thresholds:
    CLEAN: [0.0, 0.3]
    SUSPICIOUS: [0.3, 0.6]
    LIKELY_PHISHING: [0.6, 0.8]
    CONFIRMED_PHISHING: [0.8, 1.0]

# ── Pipeline Runtime Configuration ────────────────────────────────
pipeline:
  max_concurrent_analyzers: 10        # env: MAX_CONCURRENT_ANALYZERS
  url_detonation_timeout: 30          # env: URL_DETONATION_TIMEOUT_SECONDS
  pipeline_timeout: 120               # env: ANALYSIS_PIPELINE_TIMEOUT_SECONDS
  feedback_db_path: "data/feedback.db"  # env: FEEDBACK_DB_PATH
  log_level: "INFO"                   # env: LOG_LEVEL
  dashboard_port: 8000                # env: DASHBOARD_PORT
  analyst_api_token: ""               # env: ANALYST_API_TOKEN
  public_demo_mode: false             # env: PUBLIC_DEMO_MODE
  saas_db_path: "data/saas.db"         # env: SAAS_DB_PATH
  saas_session_secret: ""             # env: SAAS_SESSION_SECRET
  saas_public_signup_enabled: false    # env: SAAS_PUBLIC_SIGNUP_ENABLED
  password_reset_token_ttl_minutes: 30  # env: PASSWORD_RESET_TOKEN_TTL_MINUTES
  max_concurrent_browser: 3
