[pytest]
# Pytest configuration for phishing detection test suite

# Minimum Python version
minversion = 3.9

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests for individual components
    integration: Integration tests for multi-component workflows
    asyncio: Tests requiring asyncio support
    slow: Tests that take a long time to run

# Asyncio mode for pytest-asyncio
asyncio_mode = auto

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short

# Coverage options (when running with --cov)
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
